# Lint config — same rule set as the gemini-bridge backbone.
# helpers/ are legacy standalone WMA-art tools (compact one-liner style); they are syntax-checked by the
# test-suite (py_compile) rather than linted under the strict set.
line-length = 120
extend-exclude = ["helpers"]

[lint]
select = ["F", "E", "W", "B", "I", "UP", "RUF", "SIM", "PIE", "RET", "C4", "PTH", "Q"]
