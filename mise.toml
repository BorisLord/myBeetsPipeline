# Tooling backbone: pinned tools + tasks.
#   mise install   then   mise run test | lint | fix | audit
[tools]
python = "3.13"
uv = "latest"
ruff = "latest"

[tasks.setup]
description = "Install deps + the gbc CLI (editable) and deploy config"
run = "./setup.sh"

[tasks.test]
description = "Run the unit tests (stdlib unittest, no pytest)"
run = "uv run python -m unittest discover -s tests -t . -v"

[tasks.lint]
description = "Lint gbc + tests (ruff)"
run = "ruff check gbc tests"

[tasks.fix]
description = "Apply ruff safe auto-fixes"
run = "ruff check --fix gbc tests"

[tasks.typecheck]
description = "Static type check (mypy)"
run = "uv run --with mypy mypy gbc --ignore-missing-imports"

[tasks.upgrade]
description = "Bump everything — mise tools (uv/ruff), locked Python deps, and the uv-installed CLIs (beets/gbc)"
run = """
mise upgrade           # uv + ruff to latest (python stays pinned 3.13)
uv lock --upgrade      # repo Python deps in uv.lock (mutagen, mediafile, ...)
uv tool upgrade --all  # beets engine (+ chroma/fetchart/discogs/beetcamp extras) + the gbc editable install
"""

[tasks.audit]
description = "Scan runtime deps for known vulnerabilities"
# --skip-editable: don't audit gbc itself (not on PyPI); --cache-dir: project-local cache (avoids the
# stale global cachecontrol cache that spams 'deserialization failed' warnings).
run = "uv run --with pip-audit pip-audit --skip-editable --cache-dir .pip-audit-cache --progress-spinner off"
