# ─────────────────────────────────────────────────────────────────────────────
#  golden-beets-config  —  a beets config for album-mode music recovery
# ─────────────────────────────────────────────────────────────────────────────
# A drop-in `~/.config/beets/config.yaml` for ONE job: turn a chaotic, mis-tagged
# music dump into a clean ALBUM library you can serve with any player (Navidrome,
# Jellyfin, Plex, any Subsonic/DLNA). Each setting is commented with the reason for it.
#
# APPROACH:
#   • Album mode + AcoustID fingerprint: identify by CONTENT, not by file/folder names.
#   • quiet + quiet_fallback: skip  -> auto-accept ONLY strong matches, never guess.
#   • Only COMPLETE, strong albums are kept; weak/partial ones are left untouched
#     for manual curation (max_rec penalises missing/extra tracks).
#   • Enrichment runs NATIVELY during `beet import` (auto: yes): art, genres,
#     ReplayGain, ftintitle, scrub — no separate passes.
#   • Never lose data: matched albums MOVE to `directory:`, the rest stay put.
#
# HOW TO USE (standalone): copy to ~/.config/beets/config.yaml, set `directory:`,
#   `pip install beets[chroma,fetchart,lastgenre,discogs] beetcamp`, install fpcalc + ffmpeg, then
#   `beet import /path/to/messy/music`.
#
# CAVEAT — this file is the *config*; the full recovery tool (golden-beets-config /
#   `gbc`) adds the orchestration a config alone can't express: pre-import dedup
#   (keep best bitrate), carrying official sidecars into the album, a read-only QA
#   audit (integrity, lossy<192k, junk metadata, RIFF-in-.mp3 detection), and
#   on-demand format conversion (WMA→Opus, WAV/AIFF→FLAC). Config gets you ~80%; the
#   wrapper is the rest.
# ─────────────────────────────────────────────────────────────────────────────

directory: ~/Music/clean        # <- SET THIS: where matched albums are filed (your clean library)
# library: ~/.config/beets/library.db   # default; back it up before any bulk modify/move

# `musicbrainz` MUST be listed -- it is a separate metadata-source plugin; without it `chroma`
# yields NO MusicBrainz candidates and fingerprint matching silently finds nothing.
# discogs + deezer (beets-native) + bandcamp (needs `beetcamp`) are extra match sources, purely ADDITIVE
# (ranked by distance, never override a good MB match). fromfilename guesses title/track/artist from the
# FILENAME when tags are poor (fills EMPTY fields only). spotify/beatport left out (key-gated).
# Everything except duplicates/unimported/zero/missing/mbsync/bareasc runs automatically on import.
plugins: musicbrainz discogs deezer bandcamp chroma fromfilename fetchart embedart lastgenre replaygain scrub ftintitle duplicates unimported zero missing mbsync bareasc

import:
  move: yes              # matched albums MOVE to `directory:`; unmatched files stay where they are (curation pile)
  copy: no               # set copy:yes instead if you must keep the source untouched
  write: yes             # write clean tags back into the files
  quiet: yes             # no prompts
  quiet_fallback: skip   # in quiet mode, anything not STRONG is skipped (never guessed) -- the key safety net
  timid: no
  incremental: yes       # remember processed folders (incl. skipped) -> re-runs only touch new drops
  resume: no
  duplicate_action: skip # an album already in the library -> skip (no duplicate); review manually
  log: beets-import.log  # beets' own match/skip decisions (separate from any app log)
ignore_hidden: yes
original_date: yes       # write the ORIGINAL release year -> reissues/remasters get the true year, not the pressing

# Feed existing tags into the MusicBrainz search so it picks the RIGHT release (=> richer, accurate metadata).
musicbrainz:
  extra_tags: [alias, barcode, catalognum, country, label, media, tracks, year]
  genres: yes            # MusicBrainz genres (primary, vote-sorted); lastgenre (force:no) only fills the gaps

# Discogs = SECONDARY source (fallback): rescues releases MusicBrainz lacks. Needs beets[discogs] + a personal
# access token (https://www.discogs.com/settings/developers). The penalty keeps MusicBrainz winning ties.
discogs:
  user_token: REPLACE_ME      # leave REPLACE_ME to skip Discogs; set your own token to enable it
  data_source_mismatch_penalty: 0.5

match:
  strong_rec_thresh: 0.20   # distance < 0.20 = "strong" => auto-accepted. Higher = accept more (less strict); lower = stricter.
  preferred:
    countries: ['XW']                 # XW = worldwide (locale-neutral default); add codes (US, FR, GB|UK…) to localize
    media: ['Digital Media|File', 'CD']
    original_year: yes
  max_rec:
    missing_tracks: low        # missing tracks = INCOMPLETE album -> skipped, parked for manual curation
    unmatched_tracks: strong   # extra tracks (bonus/hidden) = complete album + extras -> auto-accept

# Skipped during import: hidden + video files + common junk. Append your own quarantine/junk folder names.
ignore: ['.*', '*.mp4', '*.mov', '*.avi', '*.mkv', '*.m4v', '*.wmv', '*.flv', '*.ts', '*.mpg', '*.mpeg', '*.webm',
         'desktop.ini', 'Thumbs.db', 'thumbs.db', '*.url', '@eaDir', '_', 'Unknown']

# Sanitise characters that break filesystems/players in the generated paths.
replace:
  '\s*:\s*': ' - '
  '[<>\?\*\|]': _
  '\"': _
  '[\\/]': _
  '^\.': _
  '\.$': _
  '[\x00-\x1f]': _
  '^-': _
  '\s+$': ''
  '^\s+': ''

duplicates:
  keys: mb_trackid mb_albumid

# Clean junk fields DURING import. `encoder` (no pattern) is ALWAYS blanked (pure tech noise);
# `comments`/`grouping` are blanked ONLY when a junk pattern matches -> a real note ("Live at…") is KEPT.
zero:
  auto: yes
  update_database: yes
  fields: comments encoder grouping
  comments: ['^Track \d+$', '^0$', '(?i)^no comment$', '(?i)https?://', '(?i)www\.', '(?i)\.(com|net|org|tk|br)\b', '(?i)\bEAC\b', '(?i)Exact Audio Copy', '(?i)\bLame\b', '(?i)CDex', '(?i)Easy CD-DA', '(?i)dBpoweramp', '(?i)AudioGrabber', '(?i)fre:ac', '(?i)\bGrip\b', '(?i)Tagged By', '(?i)Encoded by', '(?i)rip(ped)? (by|with)', '(?i)Created with', 'meXPiracy', '(?i)Autodesk', '(?i)bandcamp', '(?i)torrent', '(?i)blogspot', '(?i)\bLAMEB?\s*\d']
  grouping:  ['(?i)https?://', '(?i)www\.', '(?i)\.(com|net|org|tk|br)\b', '(?i)\bEAC\b', '(?i)Exact Audio Copy', '(?i)\bLame\b', '(?i)CDex', '(?i)dBpoweramp', '(?i)rip(ped)? (by|with)', 'meXPiracy', '(?i)bandcamp', '(?i)torrent', '(?i)blogspot', '(?i)\bLAMEB?\s*\d']

unimported:
  ignore_extensions: jpg png pdf log cue m3u nfo txt

# Special collections get an "_" prefix so they sort at the TOP of the library on disk (above the A-Z artists):
# _Soundtracks/ (VA OSTs), _Various Artists/ (VA compilations), _Singles/ (loose tracks). TAGS are unchanged
# (albumartist stays "Various Artists") so players still group by tag; the "_" is filesystem-only. The plain
# `comp:` rule keeps single-artist comps (Best of X) under the artist AND overrides beets' BUILT-IN
# 'Compilations/' default (omitting comp: does NOT work). Multi-disc uses continuous numbering (no $disc).
paths:
  # First match wins: VA soundtrack, then VA compilation, then the single-artist comp catch-all, then default.
  comp:1 albumtype:soundtrack:         '_Soundtracks/$album%aunique{}/%if{$track,$track }$artist - $title'
  comp:1 albumartist::Various Artists: '_Various Artists/$album%aunique{}/%if{$track,$track }$artist - $title'
  comp:                                '$albumartist/$album%aunique{}/%if{$track,$track }$artist - $title'
  default:                             '$albumartist/$album%if{$year, ($year)}%aunique{}/%if{$track,$track - }$title'
  singleton:                           '_Singles/%if{$albumartist,$albumartist,$artist}/%if{$album,$album%aunique{}/}%if{$track,$track - }$title'

# ── Native enrichment, all DURING `beet import` (auto: yes) ──
chroma: {auto: yes}      # AcoustID fingerprint matching (needs fpcalc / Chromaprint)
scrub: {auto: yes}       # strip foreign/garbage tags on every write. NOTE: a WMA/ASF file with a broken embedded
                         # image (mime=None) crashes scrub -> strip the image first (mutagen) before importing it.
fetchart:
  auto: yes              # cover art: local folder image first, then web sources
  maxwidth: 1000
  minwidth: 500          # reject tiny/thumbnail art
  enforce_ratio: 10%     # reject banners/strips: keep only ~square covers (within 10%)
  max_filesize: 5242880  # 5 MiB cap -- skip bloated scans
  quality: 75
  store_source: yes
  fanarttv_key: REPLACE_ME   # OPTIONAL online-art keys; leave REPLACE_ME to skip those sources (never commit keys)
  lastfm_key: REPLACE_ME
  sources: [filesystem, coverart, fanarttv, itunes, amazon, lastfm, albumart]
embedart: {auto: yes, maxwidth: 500, quality: 70, ifempty: no}   # embed the fetched art into the files
lastgenre: {auto: yes, source: album, count: 3, force: no, canonical: yes, whitelist: yes, prefer_specific: yes}
replaygain: {auto: yes, backend: ffmpeg, overwrite: yes}         # EBU R128 loudness, computed on import (needs ffmpeg)
ui: {color: no}
