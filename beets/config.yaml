# config.yaml — main beets config (album-match + native enrichment on import).
# NOTE: fanarttv_key / lastfm_key are OPTIONAL (online artwork + genres) -- leave REPLACE_ME to skip those
#       sources, or set your own keys locally (never committed).
# NOTE: setup.sh patches directory + log. library defaults to library.db alongside this file.
directory: ~/Music/beetsPipeline/clean   # setup.sh patches this from config.env
timeout: 10.0   # SQLite busy-timeout (s): a concurrent `beet ls` waits out an in-progress import write
                # instead of erroring "database is locked" (default 5.0)

# All these run automatically during import (auto: yes, configured below); duplicates/unimported/zero/
# missing/mbsync/bareasc stay command-only for manual use.
plugins: musicbrainz discogs deezer bandcamp chroma fromfilename fetchart embedart lastgenre replaygain scrub ftintitle duplicates unimported zero missing mbsync bareasc types filetote
# fromfilename: when tags are missing/poor, guess title/track/artist from the FILENAME -> better MB match
#               on a chaotic source (native, auto during import; only fills EMPTY fields, never overwrites).
# NOTE: `musicbrainz` MUST be listed -- it's a separate metadata-source plugin; without it `chroma`
#       produces NO MusicBrainz candidates and matching finds nothing.
# deezer (beets-native) + bandcamp (needs `beetcamp`, see setup.sh): extra KEYLESS match sources, purely
#        ADDITIVE (ranked by distance, never override a good MB match). spotify/beatport left out (key-gated).

# Declare the numeric AcousticBrainz flex attributes (gbc acousticbrainz pass) as floats so range
# queries work -- e.g. `beet ls mood_relaxed:0.9..` or `danceable:0.7..`. Without this beets stores
# them as text and numeric ranges silently match nothing. (bpm + initial_key are native typed fields;
# the string flex attrs -- moods_mirex, voice_instrumental -- stay text and need no declaration.)
types:
  danceable: float
  key_strength: float
  tonal: float
  mood_acoustic: float
  mood_aggressive: float
  mood_electronic: float
  mood_happy: float
  mood_party: float
  mood_relaxed: float
  mood_sad: float

import:
  move: yes          # matched albums MOVE to MUSIC_CLEAN; non-imported files stay in source (the leftover pile)
  copy: no
  write: yes
  quiet: yes
  quiet_fallback: skip
  timid: no
  incremental: yes
  resume: no
  duplicate_action: skip
  log: import.log         # relative to BEETSDIR
ignore_hidden: yes
original_date: yes        # write the ORIGINAL release date (year) -> reissues/remasters get the true year

# Use existing tags to refine the MusicBrainz search -> picks the right release => richer/accurate metadata
musicbrainz:
  extra_tags: [alias, barcode, catalognum, country, label, media, tracks, year]
  genres: yes             # genres from MusicBrainz (primary); lastgenre (force: no) only fills empty ones

# Discogs = SECONDARY metadata source (fallback): rescues releases MusicBrainz doesn't have. Needs the
# python3-discogs-client lib (beets[discogs] extra) + a personal access token. source_weight penalises
# Discogs candidates so MusicBrainz still wins ties; AcoustID/chroma matching stays MB-only (it's MB-keyed).
discogs:
  # personal access token: https://www.discogs.com/settings/developers -> "Generate new token".
  # Keep the placeholder ALONE on its line (no trailing comment) so a `user_token: REPLACE_ME` rewrite matches.
  user_token: REPLACE_ME
  data_source_mismatch_penalty: 0.5   # penalise Discogs candidates so MusicBrainz wins ties (0..1)

match:
  strong_rec_thresh: 0.20      # distance < 0.20 = "strong" -> auto-accepted (higher = accept more; verify/qa are the net)
  preferred:
    countries: ['XW']                    # XW = worldwide (locale-neutral default); add codes (US, FR, GB|UK…) to localize
    media: ['Digital Media|File', 'CD']
    original_year: yes
  max_rec:
    missing_tracks: low        # missing tracks = INCOMPLETE album -> stays parked for manual curation
    unmatched_tracks: strong   # extra tracks (bonus/hidden) = complete album + extras -> auto-accept (verify/qa are the net)

# Skipped during import: hidden files + video files. Append your own quarantine/junk folder names here.
ignore: ['.*', '*.mp4', '*.mov', '*.avi', '*.mkv', '*.m4v', '*.wmv', '*.flv', '*.ts', '*.mpg', '*.mpeg', '*.webm',
         'desktop.ini', 'Thumbs.db', 'thumbs.db', '*.url', '@eaDir', '_', 'Unknown']

replace:
  '\s*:\s*': ' - '
  '[<>\?\*\|]': _
  '\"': _
  '[\\/]': _
  '^\.': _
  '\.$': _
  '[\x00-\x1f]': _
  '^-': _
  '\s+$': ''
  '^\s+': ''

duplicates:
  keys: mb_trackid mb_albumid

zero:
  auto: yes          # native: clean junk fields DURING import (encoder always; comments only if junk-matching)
  update_database: yes
  # comments/grouping: blanked ONLY when matching a junk pattern below (a real note like "Live at…" is KEPT).
  # encoder: NO pattern => always blanked (pure tech noise: LAME/iTunes/QuickTime/Nero/Lavf…).
  fields: comments encoder grouping
  comments: ['^Track \d+$', '^0$', '(?i)^no comment$', '(?i)https?://', '(?i)www\.', '(?i)\.(com|net|org|tk|br)\b', '(?i)\bEAC\b', '(?i)Exact Audio Copy', '(?i)\bLame\b', '(?i)CDex', '(?i)Easy CD-DA', '(?i)dBpoweramp', '(?i)AudioGrabber', '(?i)fre:ac', '(?i)\bGrip\b', '(?i)Tagged By', '(?i)Encoded by', '(?i)rip(ped)? (by|with)', '(?i)Created with', 'meXPiracy', '(?i)Autodesk', '(?i)bandcamp', '(?i)torrent', '(?i)blogspot', '(?i)\bLAMEB?\s*\d']
  grouping:  ['(?i)https?://', '(?i)www\.', '(?i)\.(com|net|org|tk|br)\b', '(?i)\bEAC\b', '(?i)Exact Audio Copy', '(?i)\bLame\b', '(?i)CDex', '(?i)dBpoweramp', '(?i)rip(ped)? (by|with)', 'meXPiracy', '(?i)bandcamp', '(?i)torrent', '(?i)blogspot', '(?i)\bLAMEB?\s*\d']

unimported:
  ignore_extensions: jpg png pdf log cue m3u nfo txt
  # ignore_subdirectories: <your quarantine/dump folder names>

# Special collections get an "_" prefix so they sort at the TOP of clean/ (above the A-Z artists) on disk:
# _Soundtracks/ (VA OSTs), _Various Artists/ (VA compilations), _Singles/ (loose tracks from `gbc singletons`).
# TAGS are unchanged (albumartist stays "Various Artists") -> Navidrome still groups by tag; the "_" is
# filesystem-only. The plain `comp:` rule keeps single-artist comps (Best of X) under the artist AND overrides
# beets' BUILT-IN 'Compilations/' default (which would otherwise hijack them -- omitting comp: does NOT work).
paths:
  # First match wins: VA soundtrack, then VA compilation, then the single-artist comp catch-all, then default.
  comp:1 albumtype:soundtrack:         '_Soundtracks/$album%aunique{}/%if{$track,$track }$artist - $title'
  comp:1 albumartist::Various Artists: '_Various Artists/$album%aunique{}/%if{$track,$track }$artist - $title'
  comp:                                '$albumartist/$album%aunique{}/%if{$track,$track }$artist - $title'
  default:                             '$albumartist/$album%if{$year, ($year)}%aunique{}/%if{$track,$track - }$title'
  singleton:                           '_Singles/%if{$albumartist,$albumartist,$artist}/%if{$album,$album%aunique{}/}%if{$track,$track - }$title'

# Everything runs natively DURING `beet import` (auto: yes): chroma match, scrub, fetchart (folder->web),
# embedart, lastgenre, ftintitle, replaygain. gbc only adds dedup + sidecars + qa around it.
chroma: {auto: yes}
scrub: {auto: yes}    # MANDATORY on every move; strip mime=None ASF/WMA images first via helpers/
fetchart:
  auto: yes                # native: art fetched during import (filesystem first -> web fallback)
  maxwidth: 1000
  minwidth: 500            # reject tiny/thumbnail art (was 300)
  enforce_ratio: 10%       # reject banners/strips: keep only ~square covers (within 10%)
  max_filesize: 5242880    # 5 MiB cap -- skip bloated scans bound for the clean library
  quality: 75
  store_source: yes
  fanarttv_key: REPLACE_ME
  lastfm_key: REPLACE_ME
  sources: [filesystem, coverart, fanarttv, itunes, lastfm]  # folder cover preferred; dropped amazon+albumart (slow/blocked remotes that HANG -- fetchart has no request timeout)
embedart: {auto: yes, maxwidth: 500, quality: 70, ifempty: no}   # embed after fetchart, on import
lastgenre: {auto: yes, source: album, count: 3, force: no, canonical: yes, whitelist: yes, prefer_specific: yes}
replaygain: {auto: yes, backend: ffmpeg, overwrite: yes}   # EBU R128 during import (was a separate pass)
# Carry an album's EXTRA files into the clean album on import: booklet/scans/back art, .cue/.log, and paired
# .lrc lyrics -- the files native import drops. fetchart owns the PRIMARY cover (filesystem-first), so
# cover/front/folder are excluded here to avoid a duplicate. Uses beets' move/copy op (works in consumed AND
# preserved mode). gbc's sidecars pass no longer carries files -- it only prunes emptied source shells.
filetote:
  extensions: .pdf .cue .log .jpg .jpeg .png .gif .webp
  pairing: {enabled: yes, extensions: .lrc}
  exclude:
    patterns:
      primary-cover: ['[cC]over.*', '[fF]ront.*', '[fF]older.*']
ui: {color: no}
