# convert.yaml -- format normalisation overlay (runs in the pipeline + via `gbc convert`).
#   WMA (lossy, proprietary/legacy ASF: poor players, weak tags, scrub mime=None crash) -> Opus (open)
#   WAV + AIFF (uncompressed PCM, ~no tags, huge)                                        -> FLAC (lossless)
#   ALAC (Apple Lossless, Apple-only ecosystem)                                          -> FLAC (lossless, universal)
# Lossless source -> FLAC = ZERO quality loss + tags + ~half the size. Lossy WMA -> Opus = open + best
# quality/bitrate; the helper sets the Opus bitrate FROM the source bitrate (adaptive, [48,256] kbps) so a
# bad source stays low-bitrate (still flagged by qa's <192k check, never masked) and a good one isn't
# downscaled. Originals are MOVED to a quarantine subdir (keep_new) -- NEVER deleted. CLEAN lib only.
plugins: convert     # scrub's `auto` only hooks the IMPORT pipeline, not convert -> the encode helpers strip
                     # source metadata (-map_metadata -1) instead; beets then writes clean tags + re-embeds art
convert:
  formats:
    opus:
      command: sh @HELPERS@/wma2opus.sh $source $dest    # @HELPERS@ filled by `gbc init` (-> <repo>/helpers)
      extension: opus
    flac:
      command: sh @HELPERS@/flac-encode.sh $source $dest  # validates the FLAC decodes before keep_new moves the original
      extension: flac
  keep_new: yes               # converted file replaces the item in the library; original -> dest (quarantine)
  embed: yes                  # re-embed album art into the converted file
  never_convert_lossy_files: no   # WMA lossy MUST be converted (that is the whole point)
  id3v23: no
ui: {color: no}
